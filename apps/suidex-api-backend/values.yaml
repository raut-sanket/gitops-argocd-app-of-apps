nameOverride: api-backend
namespace: suidex-api-backend


# rollout:
#   annotatelitmus: true

service:
  port: 80
  containerPort: 4000

image:
  repository: asia-south1-docker.pkg.dev/suidex/suidex-backend/api-backend
  tag: 	fd69c462
configs:
  NODE_ENV: production
  REDIS_URL: redis://redis.redis.svc.cluster.local:6379
  SUI_RPC_URLS: https://fullnode.mainnet.sui.io:443,https://sui-rpc.publicnode.com
  PGSSLMODE: disable
  ADMIN_PASS: suidex@1883
  ADMIN_USER: suidex 
  VICTORY_TOKEN_ADDRESS: '0xbfac5e1c6bf6ef29b12f7723857695fd2f4da9a11a7d88162c15e9124c243a4a::victory_token::VICTORY_TOKEN'
  #Needed in api
  FARM_EMISSION_START_TIMESTAMP: 1761749856
  #Needed in api
  APR_CACHE_DURATION_MS: 30000

# Needed in api
  LOCKER_OBJECT_ID: '0xb604843d501173f9ea0762fbaa7cadaea3454c942deb527cb8905861ce39798b'
  GLOBAL_EMISSION_CONTROLLER_ID: '0xfbd4d5f644cc82e7486ceb048b8951a6efffe39254a6646d99f0ea6b81b5c5f4'
  FARM_OBJECT_ID: '0xc9c6844deb5031e87f14a9869736874327e4f7b9e2aef51c47f4e004c5b1053c'

replicas: 1
resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 200m
# probes:
#   livenessPath: /internal/alive
#   readinessPath: /internal/ready
#   liveness:
#     initialDelaySeconds: 3
#     periodSeconds: 3
#   readiness:
#     initialDelaySeconds: 5
#     periodSeconds: 5

autoscaling:
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

secrets:
  secretStore: suidex-store
  key: suidex-api-backend
  data:
    - name: DATABASE_URL
      property: dburl
    - name: PACKAGE_ID
      property: packageid
    - name: JWT_SECRET
      property: jwt  

ingress:
  enabled: true
  host: suidex-api.suidex.org

prometheus: 
  enabled: false

